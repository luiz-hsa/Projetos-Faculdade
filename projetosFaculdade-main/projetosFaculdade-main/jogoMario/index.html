<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    
    <title>Mario Runner</title>
</head>
<body>
   

    <div class="game-board">
        <span class="score">0</span>

        <img src="./images/clouds.png" class="cloud">
        <img src="./images/mario.gif" class="mario">
        <img src="./images/pipe.png" class="pipe">

        <div class="start-screen" id="startScreen">
            <h1>Mario Runner</h1>
            <button id="startButton" style="font-size: 18px; padding: 10px 20px;">Iniciar jogo</button>
            <p>Pressione qualquer tecla para pular durante o jogo.</p>
        </div>

        <div class="game-over-screen" id="gameOverScreen" style="display:none;">
            <h1>Game Over</h1>
            <p id="finalScoreText">Sua pontuação: 0</p>
            <button id="restartButton" style="font-size: 18px; padding: 10px 20px;">Reiniciar</button>
        </div>
    </div>
    <script src="./js/script.js"></script> 
</body>
</html>
